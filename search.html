---
layout: search
title: Search
permalink: /search/
---

<div class="search-page" data-search-index="{{ '/search.json' | relative_url }}">
  <header class="search-page-header">
    <h1 class="search-title">Search</h1>
  </header>

  <label class="search-label" for="search-input">Search posts</label>
  <input
    class="search-input"
    id="search-input"
    name="q"
    type="search"
    placeholder="Search posts"
    autocomplete="off"
    autofocus
    aria-describedby="search-status"
  >

  <p class="search-status" id="search-status" aria-live="polite"></p>
  <ul class="search-results" id="search-results" aria-label="Search results"></ul>
</div>

<script src="{{ '/js/lunr.min.js' | relative_url }}"></script>
<script src="{{ '/js/search.js' | relative_url }}"></script>
